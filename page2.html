<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>letter</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

/* 🌙 пиксельный шрифт */
* {
  font-family: "Press Start 2P", monospace;
}

/* 💫 плавное появление */
body {
  position: relative;
  margin: 0;
  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;

  background: url("./pusheen.png") center/cover no-repeat;

  animation: fadeIn 1s ease;
}

/* fade in */
@keyframes fadeIn {
  from { opacity: 0; transform: scale(1.02); }
  to { opacity: 1; transform: scale(1); }
}

/* 🌙 дыхание фона */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: inherit;
  animation: bgBreath 6s infinite ease-in-out;
  z-index: -1;
}

@keyframes bgBreath {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(0.85); }
}

/* ❤️ сердцебиение (3 удара) */
@keyframes heartbeat {

  0% { transform: translate(-125px, -120px) scale(1); }

  /* 1 */
  10% { transform: translate(-125px, -120px) scale(1.08); }
  18% { transform: translate(-125px, -120px) scale(1); }

  /* 2 */
  26% { transform: translate(-125px, -120px) scale(1.12); }
  34% { transform: translate(-125px, -120px) scale(1); }

  /* пауза */
  55% { transform: translate(-125px, -120px) scale(1); }

  /* 3 (медленный) */
  68% { transform: translate(-125px, -120px) scale(1.15); }
  80% { transform: translate(-125px, -120px) scale(1); }

  100% { transform: translate(-125px, -120px) scale(1); }
}

/* ✨ glow */
@keyframes glow {
  0% { box-shadow: 0 0 0 rgba(255,255,255,0); }
  50% { box-shadow: 0 0 25px rgba(255,255,255,0.35); }
  100% { box-shadow: 0 0 0 rgba(255,255,255,0); }
}

/* 🎵 кнопка музыки */
.music-btn {
.music-btn {
  width: 140px;
  height: 140px;

  background: url("./music.jpg") center/cover no-repeat;

  border-radius: 18px;
  border: none;

  cursor: pointer;

  position: absolute;
  top: 60px;
  left: 60px;

  display: flex;
  justify-content: center;
  align-items: center;
                              }

/* стекло */
.music-btn::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.08);
}

/* иконка */
.icon {
  position: relative;
  z-index: 2;
}

/* текст */
.text {
  font-size: 9px;
  color: white;
  margin-top: 4px;
  text-shadow: 0 2px 6px rgba(0,0,0,0.7);
  position: relative;
  z-index: 2;
}

/* когда играет */
.music-btn.playing {
  animation: heartbeat 2.4s infinite ease-in-out, glow 2.4s infinite;
}

/* 🔘 кнопка назад */
.back-btn {
  margin-top: 0;

  padding: 18px 40px;
  font-size: 18px;

  border-radius: 30px;
  border: 1px solid rgba(0,0,0,0.2);

  background: rgba(255,255,255,0.4);

  cursor: pointer;
  transition: 0.3s;

  position: absolute;
  bottom: 60px;
}
.back-btn:hover {
  transform: scale(1.05);
}

</style>
</head>

<body>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">

  <div class="icon">

    <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="white" viewBox="0 0 24 24">
      <path d="M8 5v14l11-7z"/>
    </svg>

    <svg id="pauseIcon" xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="white" viewBox="0 0 24 24" style="display:none;">
      <path d="M6 5h4v14H6zm8 0h4v14h-4z"/>
    </svg>

  </div>

  <div class="text">тапни :PP</div>

</button>

<button class="back-btn" onclick="location.href='index.html'">
назад
</button>

<script>
const music = document.getElementById("music");
const playIcon = document.getElementById("playIcon");
const pauseIcon = document.getElementById("pauseIcon");
const btn = document.querySelector(".music-btn");

function toggleMusic() {
  if (music.paused) {
    music.play();
    playIcon.style.display = "none";
    pauseIcon.style.display = "block";
    btn.classList.add("playing");
  } else {
    music.pause();
    playIcon.style.display = "block";
    pauseIcon.style.display = "none";
    btn.classList.remove("playing");
  }
}
</script>

</body>
</html>
